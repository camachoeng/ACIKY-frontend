<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="{{basePath}}/images/logo/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Finanzas ACIKY" />
    <title>Finanzas - ACIKY</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body class="min-h-screen bg-background">
    {{> header}}

    <main class="pb-32 lg:pb-12">
      <section class="px-4 md:px-8 lg:px-16 py-8">

        <!-- Header -->
        <div class="mb-6">
          <h1 class="text-2xl font-bold text-primary-dark" data-i18n="title">Finanzas de ACIKY</h1>
          <p class="text-slate-500 text-sm mt-1" data-i18n="subtitle">Transparencia financiera de nuestra organización</p>
        </div>

        <!-- Fund Summary -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 mb-6">
          <div class="flex items-center justify-between mb-4 flex-wrap gap-2">
            <h2 class="font-bold text-primary-dark flex items-center gap-2">
              <span class="material-symbols-outlined text-primary">account_balance_wallet</span>
              <span data-i18n="summary.title">Fondo ACIKY</span>
            </h2>
            <div class="flex items-center gap-2 text-sm">
              <span class="text-slate-500" data-i18n="summary.viewIn">Ver en</span>
              <button data-total-currency="CUP" class="total-currency-btn px-3 py-1 rounded-full text-xs font-bold bg-primary-dark text-white">CUP</button>
              <button data-total-currency="USD" class="total-currency-btn px-3 py-1 rounded-full text-xs font-bold bg-slate-100 text-slate-600 hover:bg-slate-200">USD</button>
            </div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="space-y-2">
              <p class="text-xs font-bold text-slate-400 uppercase tracking-wide">CUP</p>
              <div class="flex justify-between text-sm"><span class="text-slate-500" data-i18n="summary.income">Ingresos</span><span id="incomeCup" class="font-semibold text-green-600">—</span></div>
              <div class="flex justify-between text-sm"><span class="text-slate-500" data-i18n="summary.expenses">Gastos</span><span id="expenseCup" class="font-semibold text-accent-terracotta">—</span></div>
              <div class="flex justify-between text-sm border-t border-slate-100 pt-2"><span class="font-semibold text-primary-dark" data-i18n="summary.balance">Balance</span><span id="balanceCup" class="font-bold text-primary-dark">—</span></div>
            </div>
            <div class="space-y-2">
              <p class="text-xs font-bold text-slate-400 uppercase tracking-wide">USD</p>
              <div class="flex justify-between text-sm"><span class="text-slate-500" data-i18n="summary.income">Ingresos</span><span id="incomeUsd" class="font-semibold text-green-600">—</span></div>
              <div class="flex justify-between text-sm"><span class="text-slate-500" data-i18n="summary.expenses">Gastos</span><span id="expenseUsd" class="font-semibold text-accent-terracotta">—</span></div>
              <div class="flex justify-between text-sm border-t border-slate-100 pt-2"><span class="font-semibold text-primary-dark" data-i18n="summary.balance">Balance</span><span id="balanceUsd" class="font-bold text-primary-dark">—</span></div>
            </div>
            <div class="space-y-2 bg-primary/5 rounded-xl p-4">
              <p class="text-xs font-bold text-primary uppercase tracking-wide" data-i18n="summary.total">Total equivalente</p>
              <div class="flex justify-between text-sm"><span class="text-slate-500" data-i18n="summary.income">Ingresos</span><span id="totalIncome" class="font-semibold text-green-600">—</span></div>
              <div class="flex justify-between text-sm"><span class="text-slate-500" data-i18n="summary.expenses">Gastos</span><span id="totalExpense" class="font-semibold text-accent-terracotta">—</span></div>
              <div class="flex justify-between text-sm border-t border-primary/20 pt-2"><span class="font-semibold text-primary-dark" data-i18n="summary.balance">Balance</span><span id="totalBalance" class="font-bold text-lg text-primary-dark">—</span></div>
              <p id="totalCurrencyLabel" class="text-xs text-primary text-right font-medium"></p>
            </div>
          </div>
        </div>

        <!-- Filters -->
        <div class="flex flex-wrap gap-3 mb-4 items-center">
          <div class="flex gap-1 bg-white border border-slate-200 rounded-2xl p-1">
            <button data-filter-type="all" class="type-filter-btn px-3 py-1.5 rounded-xl text-xs font-medium bg-primary-dark text-white" data-i18n="filter.all">Todas</button>
            <button data-filter-type="income" class="type-filter-btn px-3 py-1.5 rounded-xl text-xs font-medium text-slate-500 hover:bg-slate-50" data-i18n="filter.income">Ingresos</button>
            <button data-filter-type="expense" class="type-filter-btn px-3 py-1.5 rounded-xl text-xs font-medium text-slate-500 hover:bg-slate-50" data-i18n="filter.expense">Gastos</button>
          </div>
          <input type="month" id="monthFilter" class="px-3 py-2 rounded-2xl border border-slate-200 text-sm outline-none focus:border-primary bg-white" />
        </div>

        <!-- Transactions -->
        <div id="transactionsList" class="space-y-2">
          <div class="flex justify-center py-12">
            <span class="material-symbols-outlined animate-spin text-primary text-3xl">progress_activity</span>
          </div>
        </div>

      </section>
    </main>

    {{> footer}}
    {{> bottom-nav}}
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
