<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="{{basePath}}/images/logo/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Establece una nueva contraseña para tu cuenta ACIKY" />
    <title>Nueva Contraseña - ACIKY</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body class="min-h-screen">
    {{> header}}

    <main class="pb-32 lg:pb-12">
      <!-- Hero -->
      <section class="bg-gradient-to-br from-primary to-primary-dark text-white py-16">
        <div class="container mx-auto px-4 text-center">
          <h1 class="text-4xl lg:text-5xl font-bold" data-i18n="title">Nueva Contraseña</h1>
          <p class="mt-4 text-white/80" data-i18n="subtitle">Ingresa tu nueva contraseña</p>
        </div>
      </section>

      <!-- Reset Password Form -->
      <section class="px-6 py-8">
        <div class="max-w-md mx-auto bg-white rounded-3xl p-8 shadow-sm border border-slate-100">

          <!-- Success message -->
          <div id="resetPasswordSuccess" class="hidden mb-4 p-4 bg-green-50 border border-green-200 rounded-2xl text-green-700 text-sm">
            <div class="flex items-center gap-2 mb-3">
              <span class="material-symbols-outlined text-sm">check_circle</span>
              <span data-i18n="success">Tu contraseña ha sido actualizada exitosamente.</span>
            </div>
            <a href="{{basePath}}/pages/login.html"
               class="block w-full text-center bg-primary-dark text-white font-bold py-3 rounded-2xl hover:bg-primary transition-colors"
               data-i18n="successLink">
              Iniciar sesión
            </a>
          </div>

          <!-- Error message -->
          <div id="resetPasswordError" class="hidden mb-4 p-4 bg-red-50 border border-red-200 rounded-2xl text-red-600 text-sm flex items-center gap-2">
            <span class="material-symbols-outlined text-sm">error</span>
            <span></span>
          </div>

          <form id="resetPasswordForm" class="space-y-5">
            <div>
              <label for="password" class="block text-sm font-medium text-primary-dark mb-2" data-i18n="password">Nueva Contraseña</label>
              <div class="relative">
                <input type="password" id="password" name="password" required minlength="8"
                       class="w-full px-4 py-3 pr-12 rounded-2xl border border-slate-200 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors text-sm"
                       data-i18n-placeholder="passwordPlaceholder" placeholder="Mínimo 8 caracteres" />
                <button type="button" class="toggle-password absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition-colors" data-target="password">
                  <span class="material-symbols-outlined text-xl">visibility</span>
                </button>
              </div>
              <p class="mt-1 text-xs text-slate-400" data-i18n="passwordHint">Debe incluir mayúsculas, minúsculas, números y caracteres especiales</p>
            </div>
            <div>
              <label for="confirmPassword" class="block text-sm font-medium text-primary-dark mb-2" data-i18n="confirmPassword">Confirmar Contraseña</label>
              <div class="relative">
                <input type="password" id="confirmPassword" name="confirmPassword" required
                       class="w-full px-4 py-3 pr-12 rounded-2xl border border-slate-200 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors text-sm"
                       data-i18n-placeholder="confirmPasswordPlaceholder" placeholder="Repite tu nueva contraseña" />
                <button type="button" class="toggle-password absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition-colors" data-target="confirmPassword">
                  <span class="material-symbols-outlined text-xl">visibility</span>
                </button>
              </div>
            </div>
            <button type="submit" id="resetPasswordBtn"
                    class="w-full bg-primary-dark text-white font-bold py-4 rounded-2xl shadow-md transition-transform active:scale-95 hover:bg-primary"
                    data-i18n="submitBtn">
              Guardar contraseña
            </button>
          </form>
        </div>
      </section>
    </main>

    {{> footer}}
    {{> bottom-nav}}

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
