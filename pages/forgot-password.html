<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="{{basePath}}/images/logo/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Recupera el acceso a tu cuenta ACIKY" />
    <title>Recuperar Contraseña - ACIKY</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body class="min-h-screen">
    {{> header}}

    <main class="pb-32 lg:pb-12">
      <!-- Hero -->
      <section class="bg-gradient-to-br from-primary to-primary-dark text-white py-16">
        <div class="container mx-auto px-4 text-center">
          <h1 class="text-4xl lg:text-5xl font-bold" data-i18n="title">Recuperar Contraseña</h1>
          <p class="mt-4 text-white/80" data-i18n="subtitle">Te enviaremos un enlace para restablecer tu contraseña</p>
        </div>
      </section>

      <!-- Forgot Password Form -->
      <section class="px-6 py-8">
        <div class="max-w-md mx-auto bg-white rounded-3xl p-8 shadow-sm border border-slate-100">

          <!-- Success message -->
          <div id="forgotPasswordSuccess" class="hidden mb-4 p-4 bg-green-50 border border-green-200 rounded-2xl text-green-700 text-sm flex items-start gap-2">
            <span class="material-symbols-outlined text-sm mt-0.5">check_circle</span>
            <span data-i18n="success">Si el correo existe en nuestro sistema, recibirás un enlace para restablecer tu contraseña.</span>
          </div>

          <!-- Error message -->
          <div id="forgotPasswordError" class="hidden mb-4 p-4 bg-red-50 border border-red-200 rounded-2xl text-red-600 text-sm flex items-center gap-2">
            <span class="material-symbols-outlined text-sm">error</span>
            <span></span>
          </div>

          <form id="forgotPasswordForm" class="space-y-6">
            <div>
              <label for="email" class="block text-sm font-medium text-primary-dark mb-2" data-i18n="email">Correo Electrónico</label>
              <input type="email" id="email" name="email" required
                     class="w-full px-4 py-3 rounded-2xl border border-slate-200 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors text-sm"
                     data-i18n-placeholder="emailPlaceholder" placeholder="tu@correo.com" />
            </div>
            <button type="submit" id="forgotPasswordBtn"
                    class="w-full bg-primary-dark text-white font-bold py-4 rounded-2xl shadow-md transition-transform active:scale-95 hover:bg-primary"
                    data-i18n="submitBtn">
              Enviar enlace
            </button>
          </form>

          <p class="mt-6 text-center text-sm text-slate-500">
            <a href="{{basePath}}/pages/login.html" class="text-primary font-semibold hover:underline" data-i18n="backToLogin">Volver al inicio de sesión</a>
          </p>
        </div>
      </section>
    </main>

    {{> footer}}
    {{> bottom-nav}}

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
