<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="{{basePath}}/images/logo/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Gestión de blog - Admin ACIKY" />
    <title>Blog - Admin ACIKY</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body class="min-h-screen">
    {{> header}}
    {{> admin-nav}}

    <main class="pb-12">
      <section class="px-6 py-8">
        <!-- Header -->
        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
          <div>
            <h1 class="text-2xl font-bold text-primary-dark" data-i18n="title">Blog</h1>
            <p class="text-slate-500 text-sm mt-1" data-i18n="subtitle">Gestiona los artículos del blog</p>
          </div>
          <div class="flex items-center gap-3">
            <a href="{{basePath}}/pages/dashboard.html" class="text-primary hover:text-primary-dark transition-colors text-sm font-medium flex items-center gap-1">
              <span class="material-symbols-outlined text-sm">arrow_back</span>
              <span data-i18n="backToProfile">Volver al perfil</span>
            </a>
            <button id="createPostBtn" class="bg-primary text-white px-4 py-2 rounded-full text-sm font-medium hover:bg-primary-dark transition-colors flex items-center gap-1">
              <span class="material-symbols-outlined text-sm">add</span>
              <span data-i18n="newButton">Nuevo Artículo</span>
            </button>
          </div>
        </div>

        <!-- Loading State -->
        <div id="blogLoading" class="text-center py-12">
          <span class="material-symbols-outlined animate-spin text-4xl text-primary">progress_activity</span>
          <p class="text-slate-500 text-sm mt-2" data-i18n="loading">Cargando artículos...</p>
        </div>

        <!-- Posts List -->
        <div id="blogContainer" class="hidden space-y-4"></div>

        <!-- Empty State -->
        <div id="blogEmpty" class="hidden text-center py-12">
          <span class="material-symbols-outlined text-5xl text-slate-300">article</span>
          <p class="text-slate-400 text-sm mt-2" data-i18n="empty">No hay artículos registrados</p>
        </div>
      </section>

      <!-- Blog Post Modal -->
      <div id="blogModal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-black/50" id="blogModalOverlay"></div>
        <div class="absolute inset-x-4 top-4 bottom-4 max-w-2xl mx-auto bg-white rounded-3xl shadow-xl overflow-y-auto">
          <div class="p-8">
            <h2 id="blogModalTitle" class="text-xl font-bold text-primary-dark mb-6" data-i18n="modal.newTitle">Nuevo Artículo</h2>

            <form id="blogForm" class="space-y-5">
              <input type="hidden" id="postId" />

              <!-- Title (ES + EN) -->
              <div>
                <label for="postTitle" class="block text-sm font-medium text-primary-dark mb-1" data-i18n="modal.title">Título</label>
                <input type="text" id="postTitle" required
                       class="w-full px-4 py-3 rounded-2xl border border-slate-200 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors text-sm"
                       data-i18n-placeholder="modal.titlePlaceholder" placeholder="Título del artículo" />
                <label for="postTitleEn" class="block text-xs font-medium text-accent-teal mt-2 mb-1">Title (EN)</label>
                <input type="text" id="postTitleEn"
                       class="w-full px-4 py-3 rounded-2xl border border-slate-200 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors text-sm"
                       placeholder="English translation (optional)" />
              </div>

              <!-- Content Blocks -->
              <div>
                <div class="flex items-center justify-between mb-3">
                  <label class="text-sm font-medium text-primary-dark" data-i18n="modal.content">Contenido</label>
                  <div class="flex items-center gap-2">
                    <button type="button" id="addTextBlockBtn"
                            class="inline-flex items-center gap-1 px-3 py-1.5 rounded-xl border border-slate-200 text-xs font-medium text-slate-600 hover:border-primary hover:text-primary transition-colors">
                      <span class="material-symbols-outlined text-sm">text_fields</span>
                      <span data-i18n="modal.blocks.addText">+ Texto</span>
                    </button>
                    <button type="button" id="addImageBlockBtn"
                            class="inline-flex items-center gap-1 px-3 py-1.5 rounded-xl border border-slate-200 text-xs font-medium text-slate-600 hover:border-primary hover:text-primary transition-colors">
                      <span class="material-symbols-outlined text-sm">image</span>
                      <span data-i18n="modal.blocks.addImage">+ Imagen</span>
                    </button>
                  </div>
                </div>
                <div id="blocksEditor" class="space-y-3"></div>
              </div>

              <!-- PDF Attachment -->
              <div class="border border-slate-200 rounded-2xl p-4">
                <p class="text-sm font-medium text-primary-dark mb-3" data-i18n="modal.pdf.label">Adjunto PDF (opcional)</p>
                <div id="pdfPreview" class="hidden flex items-center gap-3 p-3 bg-slate-50 rounded-xl mb-3">
                  <span class="material-symbols-outlined text-accent-terracotta text-2xl">picture_as_pdf</span>
                  <div class="flex-1 min-w-0">
                    <p id="pdfFileName" class="text-sm font-medium text-slate-700 truncate"></p>
                    <input type="hidden" id="pdfUrl" />
                  </div>
                  <button type="button" id="removePdfBtn" class="p-1 text-accent-terracotta hover:text-red-600 transition-colors">
                    <span class="material-symbols-outlined text-sm">close</span>
                  </button>
                </div>
                <label id="pdfUploadLabel" class="cursor-pointer inline-flex items-center gap-2 px-4 py-2 rounded-xl border border-slate-200 text-sm font-medium text-slate-600 hover:border-primary hover:text-primary transition-colors">
                  <span class="material-symbols-outlined text-sm">upload_file</span>
                  <span data-i18n="modal.pdf.upload">Subir PDF</span>
                  <input type="file" id="pdfFileInput" accept=".pdf" class="hidden" />
                </label>
                <p id="pdfUploadProgress" class="hidden text-xs text-slate-400 mt-2" data-i18n="modal.blocks.uploading">Subiendo...</p>
                <div class="mt-3 space-y-2">
                  <label class="block text-xs font-medium text-slate-500" data-i18n="modal.pdf.titleLabel">Título del PDF (ES)</label>
                  <input type="text" id="pdfTitle"
                         class="w-full px-3 py-2 rounded-xl border border-slate-200 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors text-sm"
                         data-i18n-placeholder="modal.pdf.titlePlaceholder" placeholder="Ej: Guía de Kriyas" />
                  <label class="block text-xs font-medium text-accent-teal">PDF Title (EN)</label>
                  <input type="text" id="pdfTitleEn"
                         class="w-full px-3 py-2 rounded-xl border border-slate-200 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors text-sm"
                         placeholder="E.g.: Kriya Guide" />
                </div>
              </div>

              <!-- Tags -->
              <div>
                <label for="postTags" class="block text-sm font-medium text-primary-dark mb-1" data-i18n="modal.tags">Etiquetas (ES)</label>
                <input type="text" id="postTags"
                       class="w-full px-4 py-3 rounded-2xl border border-slate-200 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors text-sm"
                       data-i18n-placeholder="modal.tagsPlaceholder" placeholder="Kundalini Yoga, Meditación, Bienestar..." />
                <p class="text-xs text-slate-400 mt-1" data-i18n="modal.tagsHelp">Separa con comas</p>
                <label for="postTagsEn" class="block text-xs font-medium text-accent-teal mt-2 mb-1" data-i18n="modal.tagsEn">Tags (EN)</label>
                <input type="text" id="postTagsEn"
                       class="w-full px-4 py-3 rounded-2xl border border-slate-200 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors text-sm"
                       data-i18n-placeholder="modal.tagsEnPlaceholder" placeholder="Kundalini Yoga, Meditation, Wellness..." />
              </div>

              <!-- Published toggle -->
              <div class="flex items-center gap-3">
                <input type="checkbox" id="postPublished"
                       class="w-5 h-5 rounded border-slate-300 text-primary focus:ring-primary" />
                <label for="postPublished" class="text-sm font-medium text-primary-dark" data-i18n="modal.published">Publicado</label>
              </div>

              <!-- Form error -->
              <div id="blogFormError" class="hidden p-3 bg-red-50 border border-red-200 rounded-xl text-red-600 text-sm"></div>

              <!-- Action buttons -->
              <div class="flex gap-3 pt-2">
                <button type="button" id="cancelPostBtn" class="flex-1 py-3 rounded-2xl border border-slate-200 font-medium text-slate-600 hover:bg-slate-50 transition-colors" data-i18n="modal.cancel">Cancelar</button>
                <button type="submit" id="savePostBtn" class="flex-1 py-3 rounded-2xl bg-primary-dark text-white font-bold hover:bg-primary transition-colors" data-i18n="modal.save">Guardar</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </main>

    {{> footer}}

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
