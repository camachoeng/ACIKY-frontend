<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="{{basePath}}/images/logo/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Configuración del sitio - Admin ACIKY" />
    <title>Configuración - Admin ACIKY</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body class="min-h-screen">
    {{> header}}
    {{> admin-nav}}

    <main class="pb-12">
      <section class="px-6 py-8 max-w-2xl mx-auto">
        <!-- Header -->
        <div class="flex items-center justify-between mb-8">
          <div>
            <h1 class="text-2xl font-bold text-primary-dark" data-i18n="title">Configuración del Sitio</h1>
            <p class="text-slate-500 text-sm mt-1" data-i18n="subtitle">Ajustes generales del sitio web</p>
          </div>
        </div>

        <!-- WhatsApp Number Card -->
        <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100">
          <div class="flex items-center gap-3 mb-6">
            <div class="w-12 h-12 bg-primary/10 rounded-full flex items-center justify-center flex-shrink-0">
              <span class="material-symbols-outlined text-primary">chat</span>
            </div>
            <div>
              <h2 class="font-bold text-primary-dark" data-i18n="whatsapp.title">Número de WhatsApp</h2>
              <p class="text-sm text-slate-500" data-i18n="whatsapp.description">Número usado en todos los botones de contacto del sitio</p>
            </div>
          </div>

          <div class="space-y-4">
            <div>
              <label for="whatsappInput" class="block text-sm font-semibold text-slate-700 mb-1" data-i18n="whatsapp.label">
                Número (solo dígitos, con código de país)
              </label>
              <div class="flex gap-3">
                <input
                  id="whatsappInput"
                  type="tel"
                  inputmode="numeric"
                  class="flex-1 px-4 py-3 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary"
                  placeholder="5350759360"
                  data-i18n-placeholder="whatsapp.placeholder"
                />
                <button
                  id="whatsappSaveBtn"
                  class="px-5 py-3 bg-primary-dark text-white text-sm font-bold rounded-xl hover:bg-primary transition-colors flex items-center gap-2">
                  <span class="material-symbols-outlined text-base">save</span>
                  <span data-i18n="whatsapp.save">Guardar</span>
                </button>
              </div>
              <p class="text-xs text-slate-400 mt-2" data-i18n="whatsapp.hint">
                Ejemplo: 5350759360 (Cuba) · 34612345678 (España) · 15551234567 (EE.UU.)
              </p>
            </div>

            <!-- Feedback -->
            <div id="whatsappFeedback" class="hidden rounded-xl px-4 py-3 text-sm"></div>

            <!-- Preview -->
            <div id="whatsappPreview" class="hidden mt-2 p-4 bg-slate-50 rounded-xl">
              <p class="text-xs font-semibold text-slate-500 mb-1" data-i18n="whatsapp.previewLabel">Vista previa del enlace:</p>
              <a id="whatsappPreviewLink" href="#" target="_blank" rel="noopener noreferrer"
                 class="text-sm text-primary hover:underline break-all"></a>
            </div>
          </div>
        </div>
      </section>
    </main>

    {{> footer}}

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
