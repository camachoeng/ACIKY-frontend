<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="{{basePath}}/images/logo/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Donaciones - Admin ACIKY" />
    <title>Donaciones - Admin ACIKY</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body class="min-h-screen">
    {{> header}}
    {{> admin-nav}}

    <main class="pb-12">
      <section class="px-6 py-8">
        <div class="flex items-center justify-between mb-6">
          <div>
            <h1 class="text-2xl font-bold text-primary-dark" data-i18n="title">Donaciones</h1>
            <p class="text-slate-500 text-sm mt-1" data-i18n="subtitle">Gestiona y confirma las donaciones recibidas</p>
          </div>
          <a href="{{basePath}}/pages/admin/festival.html" class="flex items-center gap-1 text-sm text-slate-500 hover:text-primary-dark transition-colors">
            <span class="material-symbols-outlined text-sm">settings</span>
            <span>Configurar</span>
          </a>
        </div>

        <!-- Filter tabs -->
        <div class="flex gap-2 mb-6 border-b border-slate-200">
          <button data-filter="all" class="filter-tab px-4 py-2 text-sm font-medium rounded-t-xl border-b-2 border-primary text-primary-dark" data-i18n="filter.all">Todas</button>
          <button data-filter="pending" class="filter-tab px-4 py-2 text-sm font-medium rounded-t-xl border-b-2 border-transparent text-slate-500 hover:text-primary-dark" data-i18n="filter.pending">Pendientes</button>
          <button data-filter="confirmed" class="filter-tab px-4 py-2 text-sm font-medium rounded-t-xl border-b-2 border-transparent text-slate-500 hover:text-primary-dark" data-i18n="filter.confirmed">Confirmadas</button>
          <button data-filter="rejected" class="filter-tab px-4 py-2 text-sm font-medium rounded-t-xl border-b-2 border-transparent text-slate-500 hover:text-primary-dark" data-i18n="filter.rejected">Rechazadas</button>
        </div>

        <!-- Donations list -->
        <div id="donationsList" class="space-y-3">
          <div class="flex justify-center py-12">
            <span class="material-symbols-outlined animate-spin text-primary text-3xl">progress_activity</span>
          </div>
        </div>
      </section>
    </main>

    {{> footer}}

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
